---
# LEAFS.yml
# Definition of the leafs in the fabric.

type: l3leaf

l3leaf:
  defaults:
    platform: cEOS-LAB
    loopback_ipv4_pool: 10.255.0.0/24
    loopback_ipv4_offset: 2
    vtep_loopback_ipv4_pool: 10.255.1.0/24
    mlag_peer_ipv4_pool: 10.255.254.0/24
    uplink_switches: ['s2-spine1', 's2-spine2']
    uplink_ipv4_pool: 10.255.255.0/24
    mlag_interfaces: [Ethernet1, Ethernet6]
    mlag_peer_l3_vlan: 0
    virtual_router_mac_address: 00:1c:73:00:dc:02
    spanning_tree_priority: 4096
    spanning_tree_mode: mstp
    bgp_as: "65101-65199"
    
  node_groups:
    - group: RACK1
      nodes:
        - name: s2-leaf1
          id: 1
          uplink_switch_interfaces: [Ethernet2, Ethernet2]
          mgmt_ip: 192.168.0.22/24
        - name: s2-leaf2
          id: 2
          mgmt_ip: 192.168.0.23/24
          uplink_switch_interfaces: [Ethernet3, Ethernet3]
    - group: RACK2
      nodes:
        - name: s2-leaf3
          id: 3
          mgmt_ip: 192.168.0.24/24
          uplink_switch_interfaces: [Ethernet4, Ethernet4]
        - name: s2-leaf4
          id: 4
          mgmt_ip: 192.168.0.25/24
          uplink_switch_interfaces: [Ethernet5, Ethernet5]